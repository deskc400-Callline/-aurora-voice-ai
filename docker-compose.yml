version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: aurora-postgres
    environment:
      POSTGRES_USER: aurora
      POSTGRES_PASSWORD: aurora_secret_2024
      POSTGRES_DB: aurora_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aurora"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aurora-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  coturn:
    image: coturn/coturn:latest
    container_name: aurora-turn
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "5349:5349/tcp"
      - "5349:5349/udp"
      - "10000-10100:10000-10100/udp"
    environment:
      - TURN_SERVER_NAME=aurora-turn
      - TURN_REALM=localhost
      - TURN_USERNAME=aurora
      - TURN_PASSWORD=turn_secret_2024
    command: >
      turnserver
      --listening-port=3478
      --tls-listening-port=5349
      --min-port=10000
      --max-port=10100
      --fingerprint
      --lt-cred-mech
      --user=aurora:turn_secret_2024
      --realm=localhost
      --log-file=stdout
      --verbose

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aurora-backend
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - DEBUG=false
      - SECRET_KEY=your-production-secret-key-change-this
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8000,https://*.railway.app
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://aurora:aurora_secret_2024@postgres:5432/aurora_db
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GPT_MODEL=gpt-4
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
      - ELEVENLABS_VOICE_ID=${ELEVENLABS_VOICE_ID:-}
      - TTS_ENGINE=${TTS_ENGINE:-coqui}
      - WHISPER_MODEL=base
      - STUN_SERVERS=stun:stun.l.google.com:19302
      - TURN_SERVER=turn:localhost:3478
      - TURN_USERNAME=aurora
      - TURN_PASSWORD=turn_secret_2024
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - model_cache:/root/.cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      coturn:
        condition: service_started
    command: uvicorn main:sio_app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  redis_data:
  model_cache:
